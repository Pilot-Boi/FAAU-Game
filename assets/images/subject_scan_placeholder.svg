<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Subject Scan Placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1518"/>
      <stop offset="100%" stop-color="#1b262d"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#2f4b57" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect width="1400" height="900" fill="url(#grid)"/>
  <rect x="90" y="90" width="1220" height="720" rx="10" fill="none" stroke="#4f889e" stroke-width="3"/>
  <line x1="90" y1="220" x2="1310" y2="220" stroke="#4f889e" stroke-width="2"/>
  <text x="120" y="178" fill="#8ed9ff" font-family="Consolas, monospace" font-size="42" letter-spacing="2">FACILITY SUBJECT IMAGE ARCHIVE</text>
  <text x="120" y="290" fill="#efd76b" font-family="Consolas, monospace" font-size="34">NO IMAGE DATA LOADED</text>
  <text x="120" y="350" fill="#78f089" font-family="Consolas, monospace" font-size="28">Attach per-subject image files under /assets/subjects/</text>
  <text x="120" y="400" fill="#78f089" font-family="Consolas, monospace" font-size="28">and set imageAttachment.src in scripts/directory.js</text>
  <text x="120" y="520" fill="#ffaf63" font-family="Consolas, monospace" font-size="30">STATUS: PLACEHOLDER</text>
  <text x="120" y="580" fill="#ff6b6b" font-family="Consolas, monospace" font-size="24">CLASSIFICATION: INTERNAL / RESTRICTED</text>
</svg>
